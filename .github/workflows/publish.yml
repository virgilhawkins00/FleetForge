name: Publish NPM Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (do not publish)'
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test:cov

      - name: Publish to NPM
        run: |
          if [ "${{ github.event.inputs.dry-run }}" == "true" ]; then
            node tools/scripts/publish-libs.js --dry-run
          else
            node tools/scripts/publish-libs.js
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

