global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'fleetforge-monitor'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Rule files
rule_files:
  - /etc/prometheus/alerts.yml

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # FleetForge API
  - job_name: 'fleetforge-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:3100']
        labels:
          service: 'fleetforge-api'
          environment: 'development'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'fleetforge-api'

  # Node Exporter (if running)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'fleetforge-host'

