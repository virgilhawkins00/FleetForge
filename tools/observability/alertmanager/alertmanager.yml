global:
  resolve_timeout: 5m
  # Slack configuration (uncomment and configure for production)
  # slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default-receiver'
  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
      continue: true
    - match:
        severity: warning
      receiver: 'warning-receiver'

receivers:
  - name: 'default-receiver'
    # Webhook for development (logs to console)
    webhook_configs:
      - url: 'http://host.docker.internal:3100/api/webhooks/alerts'
        send_resolved: true

  - name: 'critical-receiver'
    webhook_configs:
      - url: 'http://host.docker.internal:3100/api/webhooks/alerts'
        send_resolved: true
    # Uncomment for Slack notifications
    # slack_configs:
    #   - channel: '#fleetforge-alerts'
    #     send_resolved: true
    #     title: '🚨 Critical Alert: {{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: 'warning-receiver'
    webhook_configs:
      - url: 'http://host.docker.internal:3100/api/webhooks/alerts'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']

